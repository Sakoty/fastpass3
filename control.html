<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>プライオリティパス管理</title>
<meta name="theme-color" content="#007bff">
<style>
:root {
  --primary:#007bff; --success:#28a745; --danger:#dc3545; --bg:#f5f7fa; --text:#333;
}
*{box-sizing:border-box}
body { font-family:"Segoe UI", sans-serif; background:var(--bg); margin:0; color:var(--text); }
.container { max-width:980px; margin:auto; padding:14px; }
h1 { text-align:center; }
#clock { text-align:center; margin-bottom:10px; }
.status-badge { padding:6px 14px; border-radius:16px; font-weight:700; }
.active { background:var(--success); color:white; }
.inactive { background:var(--danger); color:white; }
.card { background:white; border-radius:12px; padding:16px; margin-top:12px; }
button { padding:12px; border:none; border-radius:10px; font-weight:700; cursor:pointer; width:100%; }
button.primary { background:var(--primary); color:white; }
button.success { background:var(--success); color:white; }
button.danger { background:var(--danger); color:white; }
.row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.tabs { display:flex; gap:6px; margin:10px 0; }
.tab { flex:1; padding:12px; text-align:center; cursor:pointer; background:#e7e9ee; border-radius:10px; font-weight:700; }
.tab.active-tab { background:var(--primary); color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
table { width:100%; border-collapse: collapse; }
th, td { border:1px solid #e5e7eb; padding:10px; text-align:center; }
.badge { padding:2px 8px; border-radius:999px; font-size:0.8rem; font-weight:700; }
.used { color:#0a7b26; }
.unused { color:#b91c1c; }
.expired { color:#b45309; }
</style>
</head>
<body>

<div class="container">
<h1>ファストパス管理</h1>
<div id="clock"></div>
<div style="text-align:center;">
  <span id="statusBadge" class="status-badge inactive">停止中</span>
</div>

<div class="tabs">
  <div class="tab active-tab" data-tab="controlTab">発券制御</div>
  <div class="tab" data-tab="timeTab">時間帯設定</div>
  <div class="tab" data-tab="specialTab">特別パス発券</div>
  <div class="tab" data-tab="passesTab">パス一覧</div>
</div>

<!-- 発券制御 -->
<div class="tab-content active" id="controlTab">
  <div class="card">
    <div class="row">
      <button id="startBtn" class="success">発券開始</button>
      <button id="stopBtn" class="danger">発券停止</button>
    </div>
  </div>
</div>

<!-- 時間帯設定 -->
<div class="tab-content" id="timeTab">
  <div class="card">
    <form id="setTimeSlots">
      <div class="row">
        <div>
          <input type="time" id="start1">
          <input type="time" id="end1">
        </div>
        <div>
          <input type="number" id="interval1" value="10">
          <input type="number" id="limit1" value="1">
        </div>
      </div>
      <button type="submit" class="primary">保存</button>
    </form>
  </div>
</div>

<!-- 特別パス -->
<div class="tab-content" id="specialTab">
  <div class="card">
    <form id="specialForm">
      <input type="text" id="specialName" placeholder="名前">
      <input type="number" id="specialPeople" placeholder="人数">
      <input type="time" id="specialStartTime">
      <input type="time" id="specialEndTime">
      <button type="submit" class="success">発行</button>
    </form>
  </div>
</div>

<!-- パス一覧 -->
<div class="tab-content" id="passesTab">
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>ID</th><th>名前</th><th>人数</th><th>時間</th><th>状態</th>
        </tr>
      </thead>
      <tbody id="passesTableBody"></tbody>
    </table>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, addDoc, collection, serverTimestamp, getDocs, deleteDoc, onSnapshot, updateDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "fastpass-system.firebaseapp.com",
  projectId: "fastpass-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* 時計 */
setInterval(()=>{
  document.getElementById("clock").textContent = new Date().toLocaleString();
},1000);

/* タブ */
document.querySelectorAll('.tab').forEach(tab=>{
  tab.onclick=()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active-tab'));
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    tab.classList.add('active-tab');
    document.getElementById(tab.dataset.tab).classList.add('active');
  }
});

/* 発券制御 */
async function setIssueStatus(status){
  await setDoc(doc(db,'settings','issueStatus'), { enabled: status });
}

document.getElementById('startBtn').onclick=()=>setIssueStatus(true);
document.getElementById('stopBtn').onclick=()=>setIssueStatus(false);

/* パス一覧 */
onSnapshot(collection(db,'passes'), snap=>{
  const tbody=document.getElementById('passesTableBody');
  tbody.innerHTML='';
  snap.forEach(docSnap=>{
    const d=docSnap.data();
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td>${d.id}</td>
      <td>${d.name}</td>
      <td>${d.people}</td>
      <td>${d.startTime}〜${d.endTime}</td>
      <td>${d.status}</td>
    `;
    tbody.appendChild(tr);
  });
});

/* 特別パス */
document.getElementById('specialForm').onsubmit=async(e)=>{
  e.preventDefault();
  const id="FP"+Math.floor(Math.random()*1000);
  await setDoc(doc(db,'passes',id),{
    id,
    name:specialName.value,
    people:specialPeople.value,
    startTime:specialStartTime.value,
    endTime:specialEndTime.value,
    status:"未使用"
  });
  alert("発行完了");
};

</script>
</body>
</html>

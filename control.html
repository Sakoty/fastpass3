<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>プライオリティパス管理（最終統合版）</title>
<meta name="theme-color" content="#007bff">
<style>
:root {--primary:#007bff; --success:#28a745; --danger:#dc3545; --bg:#f5f7fa; --text:#333;}
*{box-sizing:border-box}
body { font-family:"Segoe UI", sans-serif; background:var(--bg); margin:0; color:var(--text); }
.container { max-width:980px; margin:auto; padding:14px; }
h1 { text-align:center; }
.card { background:white; border-radius:12px; padding:16px; margin-top:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
button { padding:12px; border:none; border-radius:10px; font-weight:700; cursor:pointer; width:100%; }
.primary { background:var(--primary); color:white; }
.success { background:var(--success); color:white; }
.danger { background:var(--danger); color:white; }
.tabs { display:flex; gap:6px; margin:10px 0; }
.tab { flex:1; padding:12px; text-align:center; cursor:pointer; background:#e7e9ee; border-radius:10px; }
.tab.active-tab { background:var(--primary); color:#fff; }
.tab-content { display:none; }
.tab-content.active { display:block; }
table { width:100%; border-collapse: collapse; }
th, td { border:1px solid #ccc; padding:8px; text-align:center; }
</style>
</head>
<body>

<div id="loginDiv" class="card">
<h2>Firestoreログイン</h2>
<input id="loginId" placeholder="ID"><br>
<input id="password" type="password" placeholder="PW"><br>
<button id="loginBtn" class="primary">ログイン</button>
<p id="msg"></p>
</div>

<div id="mainContent" class="container" style="display:none;">
<h1>管理画面</h1>

<div class="tabs">
<div class="tab active-tab" data-tab="controlTab">制御</div>
<div class="tab" data-tab="timeTab">時間設定</div>
<div class="tab" data-tab="specialTab">特別発券</div>
<div class="tab" data-tab="listTab">一覧</div>
</div>

<div id="controlTab" class="tab-content active">
<div class="card">
<button id="startBtn" class="success">発券開始</button>
<button id="stopBtn" class="danger">発券停止</button>
<button id="logoutBtn" class="danger">ログアウト</button>
</div>
</div>

<div id="timeTab" class="tab-content">
<div class="card">
<form id="timeForm">
<input type="time" id="start1"><input type="time" id="end1">
<input type="number" id="interval1" placeholder="間隔">
<input type="number" id="limit1" placeholder="上限">
<button class="primary">保存</button>
</form>
</div>
</div>

<div id="specialTab" class="tab-content">
<div class="card">
<form id="specialForm">
<input id="name" placeholder="名前">
<input id="people" type="number" placeholder="人数">
<input id="s" type="time"><input id="e" type="time">
<button class="success">発行</button>
</form>
</div>
</div>

<div id="listTab" class="tab-content">
<div class="card">
<table>
<thead><tr><th>ID</th><th>名前</th><th>人数</th><th>時間</th><th>状態</th><th>削除</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getFirestore,collection,query,where,getDocs,doc,setDoc,addDoc,onSnapshot,deleteDoc} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app=initializeApp({apiKey:"AIzaSy...",projectId:"fastpass-system"});
const db=getFirestore(app);

// タブ
for(const t of document.querySelectorAll('.tab')){
 t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active-tab'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  t.classList.add('active-tab');
  document.getElementById(t.dataset.tab).classList.add('active');
 }
}

// 🔥 Firestoreログイン（ここが変更点）
loginBtn.onclick=async()=>{
 const q=query(collection(db,'users'),where('loginId','==',loginId.value));
 const s=await getDocs(q);
 if(s.empty) return msg.textContent='IDなし';
 const u=s.docs[0].data();
 if(u.password!==password.value) return msg.textContent='PW違う';
 loginDiv.style.display='none';
 mainContent.style.display='block';
};

// 制御
startBtn.onclick=()=>setDoc(doc(db,'settings','issue'),{on:true});
stopBtn.onclick=()=>setDoc(doc(db,'settings','issue'),{on:false});

// 時間設定
timeForm.onsubmit=async e=>{
 e.preventDefault();
 await setDoc(doc(db,'settings','time'),{
  start:start1.value,end:end1.value,interval:interval1.value,limit:limit1.value
 });
};

// 特別発券
specialForm.onsubmit=async e=>{
 e.preventDefault();
 await addDoc(collection(db,'passes'),{
  id:'FP'+Date.now(),
  name:name.value,
  people:people.value,
  start:s.value,end:e.value,
  status:'未使用'
 });
};

// 一覧
onSnapshot(collection(db,'passes'),snap=>{
 tbody.innerHTML='';
 snap.forEach(d=>{
  const p=d.data();
  const tr=document.createElement('tr');
  tr.innerHTML=`<td>${p.id}</td><td>${p.name}</td><td>${p.people}</td><td>${p.start}-${p.end}</td><td>${p.status}</td><td><button>削除</button></td>`;
  tr.querySelector('button').onclick=()=>deleteDoc(doc(db,'passes',d.id));
  tbody.appendChild(tr);
 });
});

logoutBtn.onclick=()=>location.reload();
</script>
</body>
</html>

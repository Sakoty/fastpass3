<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プライオリティパス管理（ログイン＋権限完全版）</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:white;padding:20px}
.card{background:#1e293b;padding:15px;margin-bottom:15px;border-radius:10px}
button{padding:8px;border:none;border-radius:6px;background:#2563eb;color:#fff}
input,select{margin:5px;padding:8px}
.pass{border-bottom:1px solid #444;padding:5px}
.hidden{display:none}
</style>
</head>
<body>

<h2>ログイン</h2>
<div class="card">
<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="PW">
<button id="loginBtn">ログイン</button>
</div>

<div id="app" class="hidden">

<h2>発券制御</h2>
<div class="card">
<button id="startBtn">発券開始</button>
<button id="stopBtn">発券停止</button>

<br>

<input id="time1" placeholder="時間1">
<input id="time2" placeholder="時間2">
<input id="time3" placeholder="時間3">

<button id="setTimeBtn">時間設定</button>

<br><br>
<button id="specialBtn">特別発券</button>
</div>

<h2>パス一覧</h2>
<div class="card" id="list"></div>

</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getFirestore,collection,addDoc,setDoc,doc,getDocs,onSnapshot,deleteDoc,query,where,updateDoc} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyDibHDpFtKBSCScK0QmB5xjKdBniS2EI1Y",
  authDomain:"fastpass-system.firebaseapp.com",
  projectId:"fastpass-system"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let currentRole="user";

const appDiv=document.getElementById('app');

// =====================
// ログイン（修正版）
// =====================
document.getElementById('loginBtn').onclick = async ()=>{

 const inputId = document.getElementById('id').value.trim();
 const inputPw = document.getElementById('pw').value.trim();

 const q = query(
  collection(db,'users'),
  where('loginId','==',inputId),
  where('password','==',inputPw)
 );

 const snap = await getDocs(q);

 if(snap.empty){
  alert('NG');
  return;
 }

 let valid=false;

 snap.forEach(d=>{
  const u=d.data();
  const now=new Date();

  if(u.validFrom && now < u.validFrom.toDate()) return;
  if(u.validUntil && now > u.validUntil.toDate()) return;

  currentRole = u.role || 'user';
  valid=true;
 });

 if(valid){
  appDiv.classList.remove('hidden');
  alert('ログイン成功：'+currentRole);
  applyRoleControl();
 }
};

// =====================
// 権限UI制御
// =====================
function applyRoleControl(){

 if(currentRole !== 'admin'){
  document.getElementById('startBtn').style.display='none';
  document.getElementById('stopBtn').style.display='none';
  document.getElementById('setTimeBtn').style.display='none';
 }

 if(currentRole === 'user'){
  document.getElementById('specialBtn').style.display='none';
 }
}

// =====================
// 発券制御
// =====================
document.getElementById('startBtn').onclick = async ()=>{
 if(currentRole!=='admin') return alert('権限なし');
 await setDoc(doc(db,'config','status'),{running:true});
 alert('開始');
};

document.getElementById('stopBtn').onclick = async ()=>{
 if(currentRole!=='admin') return alert('権限なし');
 await setDoc(doc(db,'config','status'),{running:false});
 alert('停止');
};

// =====================
// 時間設定
// =====================
document.getElementById('setTimeBtn').onclick = async ()=>{
 if(currentRole!=='admin') return alert('権限なし');

 const t1=time1.value;
 const t2=time2.value;
 const t3=time3.value;

 await setDoc(doc(db,'config','time'),{
  t1,t2,t3
 });

 alert('時間設定完了');
};

// =====================
// 特別発券
// =====================
document.getElementById('specialBtn').onclick = async ()=>{
 if(currentRole==='user') return alert('権限なし');

 await addDoc(collection(db,'passes'),{
  name:'特別',
  time:new Date().toLocaleTimeString(),
  special:true
 });

 alert('特別発券');
};

// =====================
// パス一覧
// =====================
onSnapshot(collection(db,'passes'),snap=>{

 const list=document.getElementById('list');
 list.innerHTML='';

 snap.forEach(d=>{
  const p=d.data();

  const div=document.createElement('div');
  div.className='pass';

  let delBtn='';
  if(currentRole==='admin'){
   delBtn=`<button onclick="del('${d.id}')">削除</button>`;
  }

  div.innerHTML=`${p.name || ''} ${p.time || ''} ${delBtn}`;
  list.appendChild(div);
 });
});

// =====================
// 削除
// =====================
window.del = async function(id){
 if(currentRole!=='admin') return alert('権限なし');
 await deleteDoc(doc(db,'passes',id));
};

</script>
</body>
</html>

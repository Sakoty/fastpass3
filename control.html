<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プライオリティパス管理（完全版）</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0;padding:20px}
.card{background:#fff;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
button{padding:10px;border:none;border-radius:8px;background:#007bff;color:#fff}
input{margin:5px;padding:8px}
.pass{border-bottom:1px solid #ddd;padding:5px}
</style>
</head>
<body>

<h2>ログイン</h2>
<div class="card">
<input id="id" placeholder="ID">
<input id="pw" type="password" placeholder="PW">
<button onclick="login()">ログイン</button>
</div>

<div id="app" style="display:none">

<h2>発券制御</h2>
<div class="card">
<button onclick="toggle(true)">開始</button>
<button onclick="toggle(false)">停止</button>
<p id="status"></p>
</div>

<h2>時間設定（3枠）</h2>
<div class="card">
<form id="timeForm">
<div>①<input type="time" id="s1"><input type="time" id="e1"><input type="number" id="i1" placeholder="間隔"><input type="number" id="l1" placeholder="上限"></div>
<div>②<input type="time" id="s2"><input type="time" id="e2"><input type="number" id="i2"><input type="number" id="l2"></div>
<div>③<input type="time" id="s3"><input type="time" id="e3"><input type="number" id="i3"><input type="number" id="l3"></div>
<button>保存</button>
</form>
</div>

<h2>特別発券</h2>
<div class="card">
<form id="specialForm">
<input id="name" placeholder="名前">
<input id="people" type="number" placeholder="人数">
<input id="start" type="time">
<input id="end" type="time">
<button>発券</button>
</form>
</div>

<h2>パス一覧</h2>
<div class="card" id="list"></div>

</div>

<script type="module">
import {initializeApp} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {getFirestore,collection,addDoc,setDoc,doc,getDocs,onSnapshot,deleteDoc} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig={apiKey: "AIzaSyDibHDpFtKBSCScK0QmB5xjKdBniS2EI1Y",
  authDomain: "fastpass-system.firebaseapp.com",
  projectId: "fastpass-system",
  storageBucket: "fastpass-system.firebasestorage.app",
  messagingSenderId: "858745521872",
  appId: "1:858745521872:web:29289b673855097e1200d5",
  measurementId: "G-SLPKMCNY53"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

// ログイン
async function login(){
  const q=await getDocs(collection(db,'users'));
  let ok=false;
  q.forEach(d=>{
    const data=d.data();
    if(data.loginId===loginId.value && data.password===password.value) ok=true;
  });
  if(ok){
    appDiv.style.display='block';
  }else alert('NG');
}
window.login=login;

const appDiv=document.getElementById('app');

// 発券ON/OFF
async function toggle(v){
  await setDoc(doc(db,'settings','issue'),{on:v});
}
window.toggle=toggle;

onSnapshot(doc(db,'settings','issue'),snap=>{
  if(!snap.exists())return;
  status.innerText=snap.data().on?"発券中":"停止中";
});

// 時間設定
timeForm.onsubmit=async e=>{
  e.preventDefault();
  await setDoc(doc(db,'settings','time'),{
    slots:[
      {start:s1.value,end:e1.value,interval:Number(i1.value),limit:Number(l1.value)},
      {start:s2.value,end:e2.value,interval:Number(i2.value),limit:Number(l2.value)},
      {start:s3.value,end:e3.value,interval:Number(i3.value),limit:Number(l3.value)}
    ]
  });
  alert('保存');
};

// 特別発券
specialForm.onsubmit=async e=>{
  e.preventDefault();
  if(!name.value||!people.value||!start.value||!end.value){
    alert('未入力');return;
  }

  const issueDoc=await getDocs(collection(db,'settings'));
  let issueOn=true;
  issueDoc.forEach(d=>{
    if(d.id==='issue') issueOn=d.data().on;
  });

  if(!issueOn){alert('停止中');return;}

  await addDoc(collection(db,'passes'),{
    id:'FP'+Date.now(),
    name:name.value,
    people:Number(people.value),
    start:start.value,
    end:end.value,
    createdAt:Date.now()
  });

  specialForm.reset();
};

// 一覧表示
onSnapshot(collection(db,'passes'),snap=>{
  list.innerHTML='';
  snap.forEach(d=>{
    const p=d.data();
    const div=document.createElement('div');
    div.className='pass';
    div.innerHTML=`${p.id} ${p.name} ${p.start}-${p.end} (${p.people}) <button onclick="del('${d.id}')">削除</button>`;
    list.appendChild(div);
  });
});

window.del=async id=>{
  if(!confirm('削除?'))return;
  await deleteDoc(doc(db,'passes',id));
};

</script>
</body>
</html>

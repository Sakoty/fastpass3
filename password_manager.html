<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ID・パスワード管理（権限付き）</title>

<style>
body{
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
}

input,button,select{
    padding:8px;
    margin:5px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

td,th{
    border:1px solid #444;
    padding:8px;
    text-align:center;
}

.valid{ background:#064e3b; }
.notyet{ background:#1e3a8a; }
.expired{ background:#7f1d1d; }
</style>
</head>

<body>

<h2>🔐 ID発行（権限付き）</h2>

<input id="loginId" placeholder="ID">
<input id="password" type="password" placeholder="パスワード"><br>

<label>権限</label>
<select id="role">
  <option value="user">一般ユーザー</option>
  <option value="staff">スタッフ（発券・スキャン）</option>
  <option value="admin">管理者（全権限）</option>
</select>

<br>

<label>有効開始日時</label>
<input type="datetime-local" id="validFrom">

<label>有効終了日時</label>
<input type="datetime-local" id="validUntil">

<br>
<button onclick="createUser()">ID作成</button>

<hr>

<h2>ユーザー一覧</h2>
<button onclick="loadUsers()">更新</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>権限</th>
<th>開始日時</th>
<th>終了日時</th>
<th>状態</th>
<th>削除</th>
</tr>
</thead>
<tbody id="userTable"></tbody>
</table>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
 getFirestore,
 collection,
 addDoc,
 getDocs,
 deleteDoc,
 doc,
 serverTimestamp,
 Timestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey:"AIzaSyDibHDpFtKBSCScK0QmB5xjKdBniS2EI1Y",
  authDomain:"fastpass-system.firebaseapp.com",
  projectId:"fastpass-system"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


// ======================
// 状態判定
// ======================
function getStatus(from, until){

 const now = new Date();

 if(from && now < from.toDate())
   return "notyet";

 if(until && now > until.toDate())
   return "expired";

 return "valid";
}


// ======================
// 権限表示変換
// ======================
function roleLabel(role){
  if(role === 'admin') return '管理者';
  if(role === 'staff') return 'スタッフ';
  return '一般';
}


// ======================
// ID作成（権限付き）
// ======================
window.createUser = async function(){

 const id = loginId.value.trim();
 const pw = password.value;
 const roleValue = role.value;

 if(!id || !pw){
   alert("IDとパスワードを入力");
   return;
 }

 const from = validFrom.value
   ? Timestamp.fromDate(new Date(validFrom.value))
   : null;

 const until = validUntil.value
   ? Timestamp.fromDate(new Date(validUntil.value))
   : null;

 if(from && until && from.toDate() > until.toDate()){
   alert("開始日時が終了日時より後です");
   return;
 }

 await addDoc(collection(db,"users"),{
   loginId:id,
   password:pw,
   role:roleValue, // 🔥 追加
   validFrom:from,
   validUntil:until,
   createdAt:serverTimestamp()
 });

 alert("Firestoreへ保存完了（権限付き）");

 loginId.value="";
 password.value="";
 validFrom.value="";
 validUntil.value="";

 loadUsers();
};


// ======================
// 削除
// ======================
window.deleteUser = async function(docId){
 await deleteDoc(doc(db,"users",docId));
 loadUsers();
};


// ======================
// 一覧表示
// ======================
window.loadUsers = async function(){

 const table=document.getElementById("userTable");
 table.innerHTML="";

 const snap = await getDocs(collection(db,"users"));

 snap.forEach(docSnap=>{

   const u = docSnap.data();

   const status = getStatus(u.validFrom,u.validUntil);

   const tr=document.createElement("tr");
   tr.className = status;

   const from =
     u.validFrom?.toDate()?.toLocaleString() || "-";

   const until =
     u.validUntil?.toDate()?.toLocaleString() || "-";

   let statusText="有効";
   if(status==="notyet") statusText="開始前";
   if(status==="expired") statusText="期限切れ";

   tr.innerHTML=`
     <td>${u.loginId}</td>
     <td>${roleLabel(u.role)}</td>
     <td>${from}</td>
     <td>${until}</td>
     <td>${statusText}</td>
     <td>
       <button onclick="deleteUser('${docSnap.id}')">
       削除
       </button>
     </td>
   `;

   table.appendChild(tr);
 });

};

loadUsers();

</script>

</body>
</html>
